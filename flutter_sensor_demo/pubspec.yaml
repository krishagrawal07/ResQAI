name: flutter_sensor_demo
description: Production-grade background accident detection app for Android.
publish_to: none

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  android_intent_plus: ^5.3.1
  flutter_background_service: ^5.0.10
  flutter_background_service_android: ^6.3.0
  flutter_local_notifications: ^17.2.2
  geolocator: ^10.1.1
  google_maps_flutter: ^2.9.0
  package_info_plus: ^8.1.0
  permission_handler: ^11.3.1
  shared_preferences: ^2.2.3
  sensors_plus: ^7.0.0
  telephony: ^0.2.0
  url_launcher: ^6.3.1

flutter:
  uses-material-design: true
